name: Build and Publish NuGet Packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version override (e.g. 0.887.1). Leave empty to derive from the @ionic/core version in package.json as 0.{maj}{min}{pat}.0.'
        required: false
        type: string
      publish:
        description: 'Push the packed .nupkg files to NuGet.org. Leave unchecked for a dry run that only uploads artifacts.'
        required: false
        type: boolean
        default: false

jobs:
  build-and-publish:
    name: Build, Pack (Publish if requested)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run build

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # Version scheme: 0.{ionicMajor}{ionicMinor}{ionicPatch}.{revision}
      # Source of truth for the Ionic version is the @ionic/core entry in package.json.
      # Revision defaults to 0; pass an explicit `version` input to override (e.g. 0.887.2).
      - name: Determine package version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            IONIC=$(jq -r '.dependencies["@ionic/core"]' package.json | tr -d '^~ ')
            MAJ=$(echo "$IONIC" | cut -d. -f1)
            MIN=$(echo "$IONIC" | cut -d. -f2)
            PAT=$(echo "$IONIC" | cut -d. -f3)
            if [[ -z "$MAJ" || -z "$MIN" || -z "$PAT" ]]; then
              echo "Failed to parse @ionic/core version from package.json (got '$IONIC')" >&2
              exit 1
            fi
            VERSION="0.${MAJ}${MIN}${PAT}.0"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Restore NuGet packages
        run: dotnet restore IonBlazor.CI.slnf

      - name: Build solution (Debug)
        run: dotnet build IonBlazor.CI.slnf --no-restore

      - name: Run tests
        run: dotnet test IonBlazor.CI.slnf --no-build --verbosity normal

      - name: Create output directory
        run: mkdir -p nupkgs

      # Pack packages that have no cross-project dependencies in Release mode first
      - name: Pack IonBlazor.Components
        run: |
          dotnet pack src/IonBlazor.Components/IonBlazor.Components.csproj \
            -c Release \
            -p:PackageVersion=${{ steps.version.outputs.version }} \
            --output nupkgs

      - name: Pack IonBlazor.StaticAssets
        run: |
          dotnet pack src/IonBlazor.StaticAssets/IonBlazor.StaticAssets.csproj \
            -c Release \
            -p:PackageVersion=${{ steps.version.outputs.version }} \
            --output nupkgs

      - name: Pack IonBlazor.StaticAssets.Ionic
        run: |
          dotnet pack src/IonBlazor.StaticAssets.Ionic/IonBlazor.StaticAssets.Ionic.csproj \
            -c Release \
            -p:PackageVersion=${{ steps.version.outputs.version }} \
            --output nupkgs

      - name: Pack IonBlazor.StaticAssets.Ionic.Svg
        run: |
          dotnet pack src/IonBlazor.StaticAssets.Ionic.Svg/IonBlazor.StaticAssets.Ionic.Svg.csproj \
            -c Release \
            -p:PackageVersion=${{ steps.version.outputs.version }} \
            --output nupkgs

      # IonBlazor and IonBlazor.Mcp reference IonBlazor.Components as a NuGet package in
      # Release mode, so we add the freshly packed packages as a local source before packing them.
      - name: Add local NuGet source
        run: dotnet nuget add source ${{ github.workspace }}/nupkgs --name local

      - name: Pack IonBlazor
        run: |
          dotnet pack src/IonBlazor/IonBlazor.csproj \
            -c Release \
            -p:PackageVersion=${{ steps.version.outputs.version }} \
            --output nupkgs

      - name: Pack IonBlazor.Mcp
        run: |
          dotnet pack src/IonBlazor.Mcp/IonBlazor.Mcp.csproj \
            -c Release \
            -p:PackageVersion=${{ steps.version.outputs.version }} \
            --output nupkgs

      - name: List packages
        run: ls -la nupkgs/

      - name: Upload packages as artifact
        uses: actions/upload-artifact@v5
        with:
          name: nuget-packages-${{ steps.version.outputs.version }}
          path: nupkgs/*.nupkg
          retention-days: 7

      - name: Publish packages to NuGet.org
        if: ${{ inputs.publish }}
        run: |
          dotnet nuget push 'nupkgs/*.nupkg' \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate